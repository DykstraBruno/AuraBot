name: Build Installers

# Gera os instaladores (.exe, .dmg, .AppImage) ao criar uma tag v*.*.*
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: '*.exe'
          - os: macos-latest
            platform: mac
            artifact: '*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact: '*.AppImage'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências — backend
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Instalar dependências — frontend
        working-directory: frontend
        run: npm install

      - name: Build frontend (modo Electron)
        working-directory: frontend
        run: npm run build:electron
        env:
          BUILD_TARGET: electron
          VITE_API_URL: http://localhost:3001/api

      - name: Instalar dependências — Electron
        working-directory: electron
        run: npm install

      - name: Build instalador — ${{ matrix.platform }}
        working-directory: electron
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: aurabot-${{ matrix.platform }}-${{ github.ref_name }}
          path: electron/dist/
          retention-days: 30

  # Cria a Release com todos os instaladores anexados
  release:
    name: Criar Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Baixar todos os instaladores
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: AuraBot ${{ github.ref_name }}
          body: |
            ## 🎵 AuraBot ${{ github.ref_name }}

            ### Download

            | Sistema | Arquivo |
            |---------|---------|
            | Windows | `AuraBot-Setup-${{ github.ref_name }}.exe` |
            | macOS   | `AuraBot-${{ github.ref_name }}.dmg` |
            | Linux   | `AuraBot-${{ github.ref_name }}.AppImage` |

            ### Instalação
            - **Windows:** baixe o `.exe` e execute como administrador
            - **macOS:** baixe o `.dmg`, arraste para Aplicativos
            - **Linux:** baixe o `.AppImage`, dê permissão e execute:
              ```bash
              chmod +x AuraBot-*.AppImage
              ./AuraBot-*.AppImage
              ```
          files: installers/**/*
          draft: false

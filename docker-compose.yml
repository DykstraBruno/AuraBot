version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aurabot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-aurabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_env_file}
      POSTGRES_DB:       ${POSTGRES_DB:-aurabot_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurabot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurabot_net

  # ─── Redis (cache de sessões) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aurabot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_env_file}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurabot_net

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: aurabot_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aurabot}:${POSTGRES_PASSWORD:-changeme_in_env_file}@db:5432/${POSTGRES_DB:-aurabot_dev}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
      - api_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aurabot_net

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: aurabot_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src:ro
    depends_on:
      - api
    networks:
      - aurabot_net

  # ─── Discord Bot ──────────────────────────────────────────────────────────────
  discord:
    build:
      context: ./discord
      dockerfile: Dockerfile
    container_name: aurabot_discord
    restart: unless-stopped
    env_file: ./discord/.env
    environment:
      AURABOT_API_URL: http://api:3001/api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aurabot_net
    profiles:
      - discord   # docker-compose --profile discord up

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  api_logs:

# ─── Rede ─────────────────────────────────────────────────────────────────────
networks:
  aurabot_net:
    driver: bridge
